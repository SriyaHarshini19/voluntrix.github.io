<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voluntrix</title>

  <!-- ✅ CSS IS HERE -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: linear-gradient(135deg, #e6f4ea, #e3f2fd, #fff8e1);
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: white;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    .hero {
      text-align: center;
      padding: 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 15px;
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<nav>
  <h2>Voluntrix</h2>
  <ul>
    <li><a href="#">Home</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Connecting Hearts. Creating Impact.</h1>
</section>

<div class="grid">
  <a href="food.html" class="card">🍱 Food</a>
  <a href="medicine.html" class="card">💊 Medicine</a>
  <a href="volunteer.html" class="card">🤝 Volunteering</a>
  <a href="ngo.html" class="card">🏢 NGOs</a>
</div>

<footer>
  <p>© 2026 Voluntrix</p>
</footer>

</body>
</html>
