<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Slot Booking - Voluntrix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #e3f2fd, #e1f5fe);
}

/* HEADER */
header {
  background: #1976d2;
  color: white;
  text-align: center;
  padding: 20px;
}

header h1 {
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeIn 1s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0d47a1;
  transform: scale(1.05);
}

/* SUCCESS MESSAGE */
.success {
  text-align: center;
  color: green;
  margin-top: 15px;
  display: none;
}

/* BACK BUTTON */
.back {
  display: block;
  text-align: center;
  margin-top: 20px;
  text-decoration: none;
  color: #1976d2;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<header>
  <h1>📚 Education Slot Booking</h1>
  <p>Volunteer and teach students</p>
</header>

<div class="container">

  <h2>Book Your Slot</h2>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="subject">
    <option value="">Select Subject</option>
    <option>Math</option>
    <option>Science</option>
    <option>English</option>
    <option>Computer</option>
  </select>

  <select id="slot">
    <option value="">Select Time Slot</option>
    <option>Morning (9 AM - 12 PM)</option>
    <option>Afternoon (1 PM - 4 PM)</option>
    <option>Evening (5 PM - 7 PM)</option>
  </select>

  <button onclick="bookSlot()">Book Slot</button>

  <p class="success" id="successMsg">✅ Slot booked successfully!</p>

  <a href="index.html" class="back">⬅ Back to Home</a>

</div>

<script>
function bookSlot() {
  let name = document.getElementById("name").value;
  let subject = document.getElementById("subject").value;
  let slot = document.getElementById("slot").value;

  if(name === "" || subject === "" || slot === "") {
    alert("Please fill all details!");
    return;
  }

  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
