<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voluntrix - Education</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
  color: #333;
}

header {
  background: linear-gradient(to right, #1976d2, #42a5f5);
  color: white;
  text-align: center;
  padding: 20px;
}

nav {
  background: #212121;
  padding: 12px;
  text-align: center;
}

nav a {
  color: #90caf9;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');
  background-size: cover;
  color: white;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: #e3f2fd;
  margin: 20px auto;
  padding: 25px;
  width: 280px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

footer {
  background: #212121;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h1>📚 Voluntrix</h1>
  <p>Empowering Education Through NGOs</p>
</header>

<nav>
  <a href="index.html">🏠 Home</a>
  <a href="#programs">Programs</a>
</nav>

<section class="hero">
  <h2>Learn • Teach • Grow</h2>
</section>

<section id="programs" class="section">
  <h2>Education Programs</h2>

  <!-- ✅ UPDATED LINK -->
  <div class="card">
    <h3>👩‍🏫 Volunteer Teaching</h3>
    <p>Become a teacher volunteer</p>
    <button onclick="window.location.href='booking.html'">
      Book Slot
    </button>
  </div>

  <!-- NGO CARD -->
  <div class="card">
    <h3>🏫 Educational NGOs</h3>
    <p>Explore NGOs, contacts & locations</p>
    <button onclick="goToNGOs()">View NGOs</button>
  </div>

</section>

<footer>
  <p>© 2026 Voluntrix</p>
</footer>

<script>
function goToNGOs() {
  window.location.href = "edu-ngos.html";
}
</script>

</body>
</html>
