<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voluntrix - Education</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
  color: #333;
}

/* HEADER */
header {
  background: linear-gradient(to right, #1976d2, #42a5f5);
  color: white;
  text-align: center;
  padding: 20px;
  animation: fadeDown 1s ease;
}

/* NAV */
nav {
  background: #212121;
  padding: 12px;
  text-align: center;
}

nav a {
  color: #90caf9;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');
  background-size: cover;
  background-position: center;
  color: white;
  text-align: center;
  animation: fadeIn 1.5s ease;
}

.hero h2 {
  font-size: 2.5rem;
}

.hero button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #42a5f5;
  color: white;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* CARDS */
.card {
  background: #e3f2fd;
  margin: 20px auto;
  padding: 25px;
  width: 280px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #1976d2;
  color: white;
}

/* FOOTER */
footer {
  background: #212121;
  color: white;
  text-align: center;
  padding: 10px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <h1>📚 Voluntrix</h1>
  <p>Empowering Education Through NGOs</p>
</header>

<nav>
  <a href="index.html">🏠 Home</a>
  <a href="#programs">Programs</a>
</nav>

<section class="hero">
  <h2>Learn • Teach • Grow</h2>
  <button onclick="scrollToSection()">Explore</button>
</section>

<section id="programs" class="section">
  <h2>Education Programs</h2>

  <div class="card">
    <h3>👩‍🏫 Volunteer Teaching</h3>
    <p>Become a teacher volunteer</p>
    <button onclick="showAlert()">Join</button>
  </div>

  <!-- NGO CARD -->
  <div class="card">
    <h3>🏫 Educational NGOs</h3>
    <p>Explore NGOs, contacts & locations</p>
    <button onclick="goToNGOs()">View NGOs</button>
  </div>

</section>

<footer>
  <p>© 2026 Voluntrix</p>
</footer>

<script>
function showAlert() {
  alert("Feature coming soon 🚀");
}

function scrollToSection() {
  document.getElementById("programs").scrollIntoView({
    behavior: "smooth"
  });
}

function goToNGOs() {
  window.location.href = "edu-ngos.html";
}
</script>

</body>
</html>
