<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Connect</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to right, #fff3e0, #ffe0b2);
}

/* HEADER */
header {
  background: linear-gradient(to right, #ff9800, #ff5722);
  color: white;
  text-align: center;
  padding: 20px;
}

/* NAV */
nav {
  background: #212121;
  padding: 12px;
  text-align: center;
}

nav a {
  color: #ffcc80;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1593113630400-ea4288922497');
  background-size: cover;
  background-position: center;
  color: white;
  text-align: center;
}

/* NGO SECTION */
.ngo-section {
  padding: 40px;
  text-align: center;
  background: linear-gradient(to right, #fff8e1, #ffe0b2);
}

/* CARDS */
.card {
  <button onclick="goToNGO()">View Nearby NGOs</button>
  background: #e6e6fa;
  margin: 20px auto;
  padding: 20px;
  width: 260px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* BUTTONS */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
}

.track-btn {
  background: #26a69a;
  color: white;
}

.login-btn {
  background: #ff7043;
  color: white;
}

/* DONATE */
.donate {
  background: linear-gradient(to right, #ffcc80, #ffab40);
  padding: 40px;
  text-align: center;
}

/* FOOTER */
footer {
  background: #212121;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>

</head>

<body>

<header>
  <h1>🍱 Voluntrix </h1>
  <p>Share Food, Save Lives</p>
</header>

<nav>
  <a href="index.html">🏠 Home </a>
  <a href="ngos.html">🏢 View NGOs</a>
  <a href="#donate">Donate</a>
  <button class="login-btn" onclick="login()">Login</button>
</nav>

<section class="hero">
  <h2>Connect • Help • Change</h2>
  <button onclick="scrollToSection()">Explore</button>
</section>

<section id="ngo" class="ngo-section">
  <h2>Food Tracking</h2>

  <!-- Tracker -->
  <div class="card">
    <h3>Tracking 📦</h3>
    <p>Track food donations in real-time</p>

    <button class="track-btn" onclick="addDonation()">Add Donation</button>
    <button class="track-btn" onclick="showTracker()">Track Now</button>

    <div id="trackerBox" style="display:none; margin-top:10px;">
      <h4>Live Donations:</h4>
      <div id="trackerList"></div>
    </div>
  </div>

</section>

<section id="donate" class="donate">
  <h2>Donate Food</h2>
  <button onclick="addDonation()">Donate Now</button>
</section>

<footer>
  <p>© 2026 Food Connect</p>
</footer>

<script>
let donations = [];

// 📍 Add donation with location
function addDonation() {
  let donor = prompt("Enter your name:");
  let quantity = prompt("Enter number of meals:");

  if (!donor || !quantity) return;

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {

      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      let entry = {
        name: donor,
        meals: quantity,
        time: new Date().toLocaleTimeString(),
        location: `https://www.google.com/maps?q=${lat},${lon}`
      };

      donations.push(entry);
      updateTracker();

      alert("Donation + Location added ✅");

    }, function() {
      alert("Please allow location access ❌");
    });
  } else {
    alert("Geolocation not supported");
  }
}

// 📊 Update tracker
function updateTracker() {
  let tracker = document.getElementById("trackerList");
  tracker.innerHTML = "";

  donations.forEach((d) => {
    let item = document.createElement("p");

    item.innerHTML = `
      <b>${d.name}</b> donated ${d.meals} meals at ${d.time}<br>
      📍 <a href="${d.location}" target="_blank">View Location</a>
      <hr>
    `;

    tracker.appendChild(item);
  });
}

// 👀 Show tracker
function showTracker() {
  document.getElementById("trackerBox").style.display = "block";
}

// 🔐 Login
function login() {
  let user = prompt("Enter username:");
  if (user) {
    alert("Welcome " + user + " 👋");
  }
}

// 🔽 Scroll
function scrollToSection() {
  document.getElementById("ngo").scrollIntoView({
    behavior: "smooth"
  });
}
</script>

</body>
</html>
